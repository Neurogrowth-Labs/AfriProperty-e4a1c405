<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriEstate - Real Estate Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Plus Jakarta Sans', 'sans-serif'],
            },
            fontSize: {
              'xs': ['0.75rem', { lineHeight: '1rem' }],
              'sm': ['0.8125rem', { lineHeight: '1.25rem' }],
              'base': ['0.9375rem', { lineHeight: '1.5rem' }],
              'lg': ['1.0625rem', { lineHeight: '1.75rem' }],
              'xl': ['1.125rem', { lineHeight: '1.75rem' }],
              '2xl': ['1.375rem', { lineHeight: '2rem' }],
              '3xl': ['1.75rem', { lineHeight: '2.25rem' }],
              '4xl': ['2.25rem', { lineHeight: '2.5rem' }],
              '5xl': ['3rem', { lineHeight: '3rem' }],
            },
            spacing: {
              '1': '4px',
              '2': '8px',
              '3': '12px',
              '4': '16px',
              '5': '24px',
              '6': '32px',
            },
            container: {
              center: true,
              padding: '1.5rem',
              screens: {
                sm: '640px',
                md: '768px',
                lg: '1024px',
                xl: '1200px',
              },
            },
            boxShadow: {
              'sm': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
              'DEFAULT': '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
              'md': '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
              'lg': '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
            },
            colors: {
              'brand-primary': '#7d9789',
              'brand-secondary': '#acbcae',
              'brand-accent': '#dae2d9',
              'brand-gold': '#c19541',
              'brand-light': '#faf9f5',
              'brand-dark': '#2c3931',
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
          @apply font-sans min-h-screen overflow-x-hidden bg-brand-light text-brand-dark dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300;
        }

        .mono-text {
          @apply font-mono;
        }
        input, select, textarea {
            @apply text-sm rounded-md border-slate-300 bg-white focus:ring-brand-primary focus:border-brand-primary dark:bg-slate-800 dark:border-slate-600 dark:text-white;
        }
      }
      
      @layer components {
        .glass-panel {
          @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white/60 dark:border-slate-700/60 rounded-xl shadow-lg;
        }
        .glass-header {
          @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-700/50 shadow-sm;
        }
        .glass-card {
          @apply bg-white dark:bg-slate-800 hover:bg-brand-light/50 dark:hover:bg-slate-700/50 border border-slate-200 dark:border-slate-700 transition-all duration-300 rounded-xl shadow-sm hover:shadow-md;
        }
        .glass-button {
          @apply bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 transition-all rounded-lg text-brand-dark dark:text-slate-200 shadow-sm;
        }
        .glass-badge {
          @apply bg-brand-light dark:bg-slate-800 border border-brand-accent dark:border-brand-primary text-brand-dark dark:text-brand-light rounded-full flex items-center justify-center;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0/",
    "@heroicons/react/": "https://aistudiocdn.com/@heroicons/react@^2.2.0/",
    "@google-ai/generativelanguage": "https://aistudiocdn.com/@google-ai/generativelanguage@^3.4.0",
    "react-markdown": "https://esm.sh/react-markdown@9",
    "rehype-raw": "https://esm.sh/rehype-raw@7",
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
