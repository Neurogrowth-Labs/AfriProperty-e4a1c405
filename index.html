<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriProperty - Real Estate Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Plus Jakarta Sans', 'sans-serif'],
            },
            fontSize: {
              'xs': ['0.75rem', { lineHeight: '1rem' }],
              'sm': ['0.8125rem', { lineHeight: '1.25rem' }],
              'base': ['0.9375rem', { lineHeight: '1.5rem' }],
              'lg': ['1.0625rem', { lineHeight: '1.75rem' }],
              'xl': ['1.125rem', { lineHeight: '1.75rem' }],
              '2xl': ['1.375rem', { lineHeight: '2rem' }],
              '3xl': ['1.75rem', { lineHeight: '2.25rem' }],
              '4xl': ['2.25rem', { lineHeight: '2.5rem' }],
              '5xl': ['3rem', { lineHeight: '3rem' }],
            },
            spacing: {
              '1': '4px',
              '2': '8px',
              '3': '12px',
              '4': '16px',
              '5': '24px',
              '6': '32px',
            },
            container: {
              center: true,
              padding: '1.5rem',
              screens: {
                sm: '640px',
                md: '768px',
                lg: '1024px',
                xl: '1200px',
              },
            },
            boxShadow: {
              'sm': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
              'DEFAULT': '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
              'md': '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
              'lg': '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
            },
            colors: {
              'brand-primary': '#000000',
              'brand-secondary': '#000000',
              'brand-accent': '#000000',
              'brand-gold': '#000000',
              'brand-light': '#ffffff',
              'brand-dark': '#000000',
              
              'slate': {
                50: '#ffffff',
                100: '#ffffff',
                200: '#e5e5e5',
                300: '#cccccc',
                400: '#999999',
                500: '#666666',
                600: '#333333',
                700: '#000000',
                800: '#000000',
                900: '#000000',
              },
              'blue': {
                 50: '#ffffff',
                 100: '#ffffff',
                 500: '#000000',
                 600: '#000000',
                 700: '#000000',
              },
              amber: { 400: '#000000', 500: '#000000' }, 
              yellow: { 100: '#ffffff', 800: '#000000' },
              green: { 50: '#ffffff', 500: '#000000', 600: '#000000', 800: '#000000', 900: '#000000' },
              red: { 50: '#ffffff', 100: '#ffffff', 400: '#000000', 500: '#000000', 600: '#000000', 700: '#000000' },
              white: '#ffffff',
              black: '#000000',
              transparent: 'transparent'
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #ffffff;
            color: #000000;
        }
        body {
          @apply font-sans min-h-screen overflow-x-hidden;
          background-color: #ffffff !important;
          color: #000000 !important;
        }
        
        h1, h2, h3, h4, h5, h6, p, span, div, label, input, select, textarea, button, a {
          color: #000000;
        }

        /* Modals and overlays should be white */
        .bg-black.bg-opacity-60, .bg-black.bg-opacity-70, 
        .bg-black.bg-opacity-80, .bg-black.bg-opacity-90, 
        .bg-black\/80 {
          background-color: rgba(255, 255, 255, 0.9) !important;
        }

        .mono-text {
          @apply font-mono;
        }
        input, select, textarea {
            @apply text-sm rounded-md border-black bg-white focus:ring-black focus:border-black;
            border: 1px solid #000000 !important;
        }
      }
      
      @layer components {
        .glass-panel {
          @apply bg-white border border-black rounded-xl;
        }
        .glass-header {
          @apply bg-white border-b border-black;
        }
        .glass-card {
          @apply bg-white hover:bg-slate-100 border border-black transition-all duration-300 rounded-xl;
        }
        .glass-button {
          @apply bg-white hover:bg-slate-100 border border-black transition-all rounded-lg text-black;
        }
        .glass-badge {
          @apply bg-white border border-black text-black rounded-full flex items-center justify-center;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0/",
    "@heroicons/react/": "https://aistudiocdn.com/@heroicons/react@^2.2.0/",
    "@google-ai/generativelanguage": "https://aistudiocdn.com/@google-ai/generativelanguage@^3.4.0",
    "react-markdown": "https://esm.sh/react-markdown@9",
    "rehype-raw": "https://esm.sh/rehype-raw@7",
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
